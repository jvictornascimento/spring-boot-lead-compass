spring:
  application:
    name: leadCompass
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lead_compass}
    username: ${DB_USERNAME:lead_compass}
    password: ${DB_PASSWORD:lead_compass}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
